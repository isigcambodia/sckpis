<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ISI Steel — Supply Chain Performance Blueprint</title>
<style>
  :root { --bg:#fff; --surface:#fafafa; --surface-hi:#f4f4f5; --border:#e7e7ea; --border-strong:#d4d4d8; --text:#09090b; --text-mid:#3f3f46; --text-muted:#71717a; --text-faint:#a1a1aa; --brand:#1e40af; --brand-strong:#011e41; --brand-bg:#eef2ff; --brand-border:#c7d2fe; --t1:#16a34a; --t2:#2563eb; --t3:#525252; --t4:#ea580c; --t5:#a3a3a3; --r:6px; --rl:10px; --sw:240px; --th:52px; }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button,input{font-family:inherit;font-size:inherit}
  kbd{font-family:ui-monospace,Menlo,monospace;font-size:10px;padding:1px 5px;background:var(--surface-hi);border:0.5px solid var(--border-strong);border-radius:4px;color:var(--text-mid)}

  #frame{height:100vh;overflow:hidden;position:relative}
  .logo{display:block;height:auto;flex-shrink:0}
  .logo-login{width:160px;margin-bottom:32px}
  .logo-side{width:104px}

  #login{position:absolute;inset:0;background:#fff;z-index:10;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
  .login-grid{width:100%;max-width:420px}
  #login h1{font-size:24px;font-weight:600;margin:0 0 8px;letter-spacing:-0.6px;line-height:1.2}
  .login-sub{color:var(--text-muted);font-size:13px;line-height:1.55;margin:0 0 28px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;font-weight:500;color:var(--text-mid);margin-bottom:6px}
  .field input{width:100%;padding:8px 11px;border:1px solid var(--border-strong);border-radius:var(--r);font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .12s,box-shadow .12s}
  .field input:hover{border-color:#a1a1aa}
  .field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(30,64,175,.12)}
  .login-err{color:#dc2626;font-size:12px;min-height:16px;margin:8px 0;font-weight:500}
  .btn-primary{width:100%;padding:9px 14px;background:var(--brand-strong);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;transition:background .12s}
  .btn-primary:hover{background:#002a5e}

  #app{display:none;height:100%}
  #frame.authed #app{display:flex}
  #frame.authed #login{display:none}

  .side{width:var(--sw);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
  .side-top{padding:14px 14px 12px}
  .side-brand{display:flex;flex-direction:column;gap:4px;padding:2px}
  .side-brand-sub{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:0.3px;text-transform:uppercase;padding-left:1px}
  .side-search{padding:4px 14px 10px;position:relative}
  .side-search input{width:100%;padding:6px 10px 6px 28px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;outline:none;background:#fff;transition:border-color .12s}
  .side-search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(30,64,175,.1)}
  .side-search .ic{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--text-faint);pointer-events:none}
  .side-search .kbd-h{position:absolute;right:20px;top:50%;transform:translateY(-50%);pointer-events:none}
  .side-nav{flex:1;overflow-y:auto;padding:4px 8px 14px}
  .nav-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:var(--r);cursor:pointer;color:var(--text-mid);font-size:12.5px;font-weight:500;margin:1px 0}
  .nav-item:hover{background:var(--surface-hi);color:var(--text)}
  .nav-item.active{background:var(--brand-bg);color:var(--brand)}
  .nav-item .ic{color:var(--text-faint)}
  .nav-item.active .ic{color:var(--brand)}
  .nav-sec{margin-top:14px}
  .nav-sec-h{display:flex;align-items:center;justify-content:space-between;padding:4px 9px;margin-bottom:2px;cursor:pointer;user-select:none;border-radius:var(--r)}
  .nav-sec-h:hover{background:var(--surface-hi)}
  .nav-sec-h .h-l{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
  .nav-sec-h .num{font-size:9px;font-weight:700;color:var(--text-faint);letter-spacing:0.4px}
  .nav-sec-h .nm{font-size:11px;font-weight:600;color:var(--text-mid);letter-spacing:0.2px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nav-sec-h .cnt{font-size:10px;color:var(--text-faint);padding:0 5px;min-width:14px;text-align:right}
  .nav-sec-h .chev{color:var(--text-faint);transition:transform .15s}
  .nav-sec.collapsed .chev{transform:rotate(-90deg)}
  .nav-sec.collapsed .nav-sec-body{display:none}
  .nav-sub{font-size:9.5px;color:var(--text-faint);padding:6px 9px 3px 28px;font-style:italic;font-weight:500}
  .kpi-link{display:flex;align-items:center;gap:7px;padding:5px 9px 5px 28px;color:var(--text-mid);font-size:12px;line-height:1.35;cursor:pointer;border-radius:var(--r);margin:1px 0;position:relative}
  .kpi-link:hover{background:var(--surface-hi);color:var(--text)}
  .kpi-link.active{background:var(--brand-bg);color:var(--brand);font-weight:500}
  .kpi-link.active::before{content:'';position:absolute;left:16px;top:50%;transform:translateY(-50%);width:3px;height:14px;background:var(--brand);border-radius:2px}
  .kpi-link.hidden{display:none}
  .kpi-link .tg{font-size:11px;font-weight:700;flex-shrink:0}
  .kpi-link .tg.lag{color:var(--text-mid)}
  .kpi-link .tg.lead{color:var(--brand)}
  .kpi-link.active .tg.lag{color:var(--brand)}
  .side-foot{border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
  .user{display:flex;align-items:center;gap:8px;min-width:0}
  .user-av{width:24px;height:24px;border-radius:50%;background:var(--brand-strong);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .user-av.admin{background:var(--brand)}
  .user-meta{display:flex;flex-direction:column;line-height:1.2;min-width:0}
  .user-meta .role{font-size:11px;font-weight:600;color:var(--text)}
  .user-meta .org{font-size:10px;color:var(--text-muted)}
  .signout{background:transparent;border:none;color:var(--text-faint);cursor:pointer;padding:4px;border-radius:4px}
  .signout:hover{background:var(--surface-hi);color:var(--text-mid)}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;background:#fff}
  .topbar{height:var(--th);flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;background:#fff}
  .crumbs{display:flex;align-items:center;gap:6px;flex:1;min-width:0;font-size:12.5px;color:var(--text-muted);overflow:hidden}
  .crumb{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crumb.current{color:var(--text);font-weight:500}
  .sep{color:var(--text-faint);font-size:11px;flex-shrink:0}
  .actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .save{font-size:11px;color:var(--text-muted);margin-right:4px;min-height:14px;min-width:50px;text-align:right}
  .save.on{color:var(--t1)}
  .btn{background:#fff;border:1px solid var(--border-strong);padding:5px 10px;border-radius:var(--r);cursor:pointer;font-size:11.5px;font-weight:500;color:var(--text-mid);display:inline-flex;align-items:center;gap:5px;transition:all .12s}
  .btn:hover{background:var(--surface);color:var(--text);border-color:#a1a1aa}
  .btn.brand{background:var(--brand-strong);color:#fff;border-color:var(--brand-strong)}
  .btn.brand:hover{background:#002a5e;color:#fff}
  .btn.danger{color:#b91c1c}
  .btn.danger:hover{background:#fef2f2;border-color:#fecaca}
  #content{flex:1;overflow-y:auto;padding:24px 32px 60px}

  .hero{margin-bottom:22px}
  .hero-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:0.2px}
  .pill.lag{background:#f1f5f9;color:#334155;border:1px solid #e2e8f0}
  .pill.lead{background:var(--brand-bg);color:var(--brand);border:1px solid var(--brand-border)}
  .pill .ar{font-size:11px;font-weight:800}
  .chap-mini{font-size:10.5px;color:var(--text-muted);font-weight:500;letter-spacing:0.3px;text-transform:uppercase}
  .hero h1{font-size:26px;font-weight:600;letter-spacing:-0.7px;margin:0 0 6px;line-height:1.18}
  .hero-meta{display:flex;align-items:center;gap:14px;color:var(--text-muted);font-size:12.5px;flex-wrap:wrap}
  .hero-meta .item b{color:var(--text-mid);font-weight:500}
  .hero-meta .dot{width:2px;height:2px;border-radius:50%;background:var(--text-faint)}
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;margin-bottom:14px}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
  .card-t{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:0.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .card-t .badge{background:var(--surface-hi);color:var(--text-muted);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
  .card-sub{font-size:11.5px;color:var(--text-faint);font-weight:500}
  .prose{font-size:13px;line-height:1.65;color:var(--text-mid);margin:0}
  .div{height:1px;background:var(--border);margin:14px 0;border:0}
  .mini-l{font-size:10.5px;font-weight:600;color:var(--text);margin-bottom:5px}
  .mini-c{font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:0.4px;text-transform:uppercase;margin-bottom:8px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .fblock{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:13px;color:var(--text);font-weight:500;margin-bottom:10px;line-height:1.5}
  .fnote{font-size:12px;color:var(--text-muted);line-height:1.55;margin:0}
  .comp-list{display:grid;gap:8px;margin-top:12px}
  .comp{display:grid;grid-template-columns:36px 1fr;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
  .comp-l{font-size:14px;font-weight:700;color:var(--brand);font-family:ui-monospace,monospace;padding-top:1px}
  .comp-nm{font-size:11px;font-weight:600;color:var(--text);letter-spacing:0.2px;text-transform:uppercase;margin-bottom:2px}
  .comp-fm{font-size:12px;font-family:ui-monospace,monospace;color:var(--brand);margin-bottom:4px}
  .comp-dc{font-size:12px;color:var(--text-muted);line-height:1.5}
  .ex-g{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:14px}
  .ex-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);align-items:baseline}
  .ex-row:last-child{border-bottom:none}
  .ex-row .p{font-size:12px;color:var(--text-muted)}
  .ex-row .v{font-size:12.5px;font-weight:600;color:var(--text);font-family:ui-monospace,monospace}
  .ex-row .u{font-size:11px;color:var(--text-faint)}
  .ex-row .vf{font-family:ui-monospace,monospace;color:var(--brand);font-weight:500;font-size:11.5px}
  .ex-row .b-c{color:var(--text);font-weight:600}
  .result{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--brand-strong);color:#fff;border-radius:var(--rl);margin-top:4px}
  .result-l{flex:1;min-width:0}
  .result-lbl{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:2px}
  .result-fm{font-size:11.5px;font-family:ui-monospace,monospace;color:rgba(255,255,255,.85)}
  .result-v{font-size:28px;font-weight:600;font-family:ui-monospace,monospace;letter-spacing:-0.5px;flex-shrink:0}
  .bench-row{display:grid;grid-template-columns:14px 1fr auto;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center}
  .bench-row:last-child{border-bottom:none}
  .bench-d{width:10px;height:10px;border-radius:3px}
  .bench-d.t1{background:var(--t1)} .bench-d.t2{background:var(--t2)} .bench-d.t3{background:var(--t3)} .bench-d.t4{background:var(--t4)} .bench-d.t5{background:var(--t5)}
  .bench-nm{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:2px}
  .bench-dc{font-size:11.5px;color:var(--text-muted);line-height:1.45}
  .bench-r{font-size:12px;font-weight:600;font-family:ui-monospace,monospace;padding:3px 8px;border-radius:4px;white-space:nowrap}
  .bench-r.t1{color:var(--t1);background:#f0fdf4;border:1px solid #bbf7d0}
  .bench-r.t2{color:var(--t2);background:#eff6ff;border:1px solid #bfdbfe}
  .bench-r.t3{color:var(--t3);background:#f4f4f5;border:1px solid #d4d4d8}
  .bench-r.t4{color:var(--t4);background:#fff7ed;border:1px solid #fed7aa}
  .bench-r.t5{color:var(--t5);background:#fafafa;border:1px solid #e4e4e7}
  .notes{display:grid;gap:14px}
  .note{display:grid;grid-template-columns:28px 1fr;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
  .note-n{font-size:11px;font-weight:700;color:var(--brand);font-family:ui-monospace,monospace;padding-top:2px}
  .note-t{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:4px}
  .note-b{font-size:12px;color:var(--text-mid);line-height:1.55}
  .take{background:#fef9c3;border:1px solid #fde047;border-radius:var(--rl);padding:16px 20px}
  .take-l{font-size:10px;font-weight:700;color:#854d0e;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .take-b{font-size:13px;color:#422006;line-height:1.6;font-weight:500}
  #frame.editing [data-edit]{background:rgba(30,64,175,.04);outline:1px dashed rgba(30,64,175,.3);outline-offset:2px;cursor:text}
  #frame.editing [data-edit]:hover{outline-color:rgba(30,64,175,.5);background:rgba(30,64,175,.07)}
  #frame.editing [data-edit]:focus{outline:2px solid var(--brand);outline-offset:2px;background:rgba(30,64,175,.08)}
  .edit-banner{display:none;background:var(--brand-bg);color:var(--brand);border-bottom:1px solid var(--brand-border);padding:7px 18px;font-size:12px;font-weight:500;align-items:center;gap:8px}
  #frame.editing .edit-banner{display:flex}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:20px 0 22px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
  .stat-lbl{font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
  .stat-v{font-size:24px;font-weight:600;letter-spacing:-0.6px;font-family:ui-monospace,monospace;line-height:1;margin-bottom:6px}
  .stat-f{font-size:11px;color:var(--text-muted)}
  .stat-f .ar{font-weight:800;margin-right:3px}
  .stat-f .lc{color:var(--text-mid)}
  .stat-f .ldc{color:var(--brand);margin-left:8px}
  .ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ch{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;cursor:pointer;transition:all .12s;min-height:110px;display:flex;flex-direction:column}
  .ch:hover{border-color:var(--brand-border);transform:translateY(-1px)}
  .ch.dis{opacity:0.55;cursor:not-allowed}
  .ch.dis:hover{border-color:var(--border);transform:none}
  .ch-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .ch-num{font-size:10.5px;font-weight:700;color:var(--text-faint);letter-spacing:0.5px;font-family:ui-monospace,monospace}
  .ch-cnt{font-size:11px;color:var(--text-muted);font-weight:500}
  .ch-cnt b{color:var(--text);font-weight:600;font-family:ui-monospace,monospace}
  .ch-nm{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
  .ch-dc{font-size:12px;color:var(--text-muted);line-height:1.5;flex:1}
  .ch-m{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:10.5px;color:var(--text-faint)}
  .ch-m .ll{display:inline-flex;align-items:center;gap:4px}
  .ch-m .ll .ar{font-weight:800}
  .page-t{font-size:22px;font-weight:600;letter-spacing:-0.6px;margin:0}
  .page-s{font-size:13px;color:var(--text-muted);margin:4px 0 0}
  .legend{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-top:18px}
  .legend-h{font-size:10.5px;font-weight:600;color:var(--text-muted);letter-spacing:0.4px;text-transform:uppercase;margin-bottom:10px}
  .lr{display:flex;align-items:baseline;gap:10px;font-size:12px;line-height:1.5;margin-bottom:8px}
  .lr .pm{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:ui-monospace,monospace;flex-shrink:0}
  .lr .pm.lag{background:#f1f5f9;color:#334155}
  .lr .pm.lead{background:var(--brand-bg);color:var(--brand)}
  .lr .desc{color:var(--text-muted)}
  .lr .desc b{color:var(--text);font-weight:600}
  .stage{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:999px;font-size:11px;font-weight:500;margin-bottom:12px}
  .ic{width:14px;height:14px;display:inline-block;vertical-align:middle;flex-shrink:0}
</style>
</head>

<script>
"use strict";
var CHAPTERS=[{n:"01",name:"Planning",desc:"How demand is forecast and translated into a producible plan.",count:10,lag:7,lead:3},{n:"02",name:"Production & Manufacturing",desc:"Cross-line metrics — the common scale for comparing equipment performance.",count:13,lag:9,lead:4},{n:"03",name:"Manufacturing Line-Specific",desc:"Indicators unique to galvanise, slitting, pipe, and roofing lines.",count:25,lag:22,lead:3},{n:"04",name:"Quality Assurance",desc:"Outcome quality, process capability, SPC stability, and MSA.",count:16,lag:13,lead:3},{n:"05",name:"Engineering & Maintenance",desc:"Reliability, availability, and the discipline that drives OEE.",count:11,lag:7,lead:4},{n:"06",name:"Warehouse & Logistics",desc:"Inventory accuracy, fulfilment performance, and physical movement.",count:14,lag:11,lead:3},{n:"07",name:"End-to-End Supply Chain",desc:"Cross-functional metrics that read the whole chain.",count:9,lag:7,lead:2}];
var KPIS=[
{id:"mape",chapter:1,n:"01",type:"lag",name:"Forecast Accuracy",acronym:"MAPE",chapterArea:"Demand Forecasting",def:"The closeness of the demand forecast to actual realised demand, expressed as the mean absolute percentage error across forecasted periods. Lower MAPE means a more accurate forecast.",why:"Every downstream supply-chain decision — inventory, production scheduling, capacity, raw material purchasing — is built on the demand forecast. A poor forecast forces costly safety stock, expediting, or stock-outs. MAPE is the headline measure of forecast quality.",formula:{main:"MAPE = (1/n) × Σ |Aₜ − Fₜ| / Aₜ × 100%",note:"Where Aₜ is actual demand in period t, Fₜ is forecast for period t, and n is the number of periods evaluated."},example:{title:"Galvanised coil demand, 4-month period",inputs:[["Apr — Forecast / Actual","5,000 / 5,400","tonnes"],["May — Forecast / Actual","5,200 / 4,800","tonnes"],["Jun — Forecast / Actual","5,500 / 6,100","tonnes"],["Jul — Forecast / Actual","5,300 / 5,200","tonnes"]],calcs:[["Apr","|5400−5000|/5400","7.4%"],["May","|4800−5200|/4800","8.3%"],["Jun","|6100−5500|/6100","9.8%"],["Jul","|5200−5300|/5200","1.9%"]],result:{label:"MAPE",formula:"(7.4 + 8.3 + 9.8 + 1.9) ÷ 4",value:"6.9%"}},benchmarks:[{tier:"World class",range:"≤ 10%",desc:"Stable demand, mature S&OP, statistical forecasting with judgemental overlay."},{tier:"Strong",range:"10–20%",desc:"Disciplined forecast review and clean historical data."},{tier:"Industry average",range:"20–30%",desc:"Typical for steel producers serving mixed customer bases."},{tier:"Below average",range:"30–50%",desc:"Reactive ordering and weak demand signal."},{tier:"Underperforming",range:"> 50%",desc:"Forecast adds little value over a naive baseline."}],notes:[{title:"Pair MAPE with bias",body:"MAPE measures magnitude only; a forecast consistently 10% high and 10% low has the same MAPE but very different consequences. Always read MAPE alongside Forecast Bias."},{title:"Calculate at the right level",body:"MAPE at SKU-level is harsher than at family-level. Pick the level that matches the planning decision being made."},{title:"Beware of zero-actual periods",body:"When actual demand is zero, the percentage error is undefined. Use weighted MAPE (WMAPE) for sparse demand profiles."},{title:"Track lag-1 and lag-3 separately",body:"Forecast accuracy at frozen horizon (lag-1) tells you how stable the plan is. Lag-3 tells you how well long-range forecasts hold up."}],takeaway:"MAPE is the single most diagnostic forecast metric — but only when combined with bias, calculated at the right grain, and tracked as a trend rather than a snapshot."},
{id:"sop",chapter:1,n:"08",type:"lead",name:"S&OP Cycle Adherence",acronym:"S&OP",chapterArea:"Planning Discipline",def:"The percentage of S&OP cycle steps completed on schedule each month — demand review, supply review, integrated reconciliation, executive sign-off.",why:"S&OP only works as a sequence — demand input feeds supply review, which feeds reconciliation, which feeds sign-off. When steps slip, the next downstream step works with stale data, or skips entirely. Adherence is the discipline that protects the whole loop.",formula:{main:"Adherence = Steps On-Time ÷ Total Scheduled Steps × 100%",note:"Measured monthly; covers all four cycle steps with their named deliverables and meeting dates."},example:{title:"Monthly S&OP cycle, Q3",inputs:[["Demand reviews — scheduled / on time","3 / 3","—"],["Supply reviews — scheduled / on time","3 / 2","—"],["Reconciliations — scheduled / on time","3 / 3","—"],["Exec sign-offs — scheduled / on time","3 / 2","—"]],calcs:[["Total","Scheduled / on time","12 / 10"],["Adherence","10 ÷ 12","83.3%"]],result:{label:"Adherence",formula:"10 of 12 cycle steps on time",value:"83.3%"}},benchmarks:[{tier:"World class",range:"100%",desc:"S&OP is a non-negotiable rhythm; deadlines are honoured."},{tier:"Strong",range:"≥ 95%",desc:"Occasional slips with named cause and recovery."},{tier:"Industry average",range:"85–95%",desc:"Routine slippage; cycle still functioning."},{tier:"Below average",range:"70–85%",desc:"Cycle integrity is breaking down; downstream metrics drift."},{tier:"Underperforming",range:"< 70%",desc:"S&OP is performative, not operational."}],notes:[{title:"Adherence is leading, not coincident",body:"S&OP slip in month N shows up as forecast accuracy degradation in month N+1. Lagging metrics catch the problem; this one prevents it."},{title:"Calendar before commitment",body:"Set the S&OP calendar 12 months ahead and treat it as fixed. Letting it move per month invites chronic slippage."},{title:"Decision quality, not just attendance",body:"A review where decisions are deferred is a delayed slip in disguise. Track deferred decisions as a separate quality marker."},{title:"Executive presence is the integrity test",body:"When executives stop attending, the cycle is dead even if the calendar still ticks."}],takeaway:"S&OP adherence is the quietest leading indicator in the planning suite. When the rhythm slips, every downstream metric is borrowing time."},
{id:"oee",chapter:2,n:"01",type:"lag",name:"Overall Equipment Effectiveness",acronym:"OEE",chapterArea:"Equipment Performance",def:"The single most important indicator of how effectively manufacturing equipment is utilised against its full theoretical potential. OEE compresses three independent dimensions — availability, performance, and quality — into one disciplined number.",why:"A line that runs at full speed but produces 30% reject is failing. So is a line that runs at 100% quality but only operates half its planned hours. OEE forces all three dimensions into the same conversation, exposing trade-offs that single-dimension metrics hide.",formula:{main:"OEE = A × P × Q",note:"All three components are ratios between 0 and 1, expressed as percentages. Their product is the headline OEE figure.",components:[{letter:"A",name:"Availability",formula:"Run Time ÷ Planned Production Time",desc:"Fraction of planned time during which the equipment was actually running."},{letter:"P",name:"Performance",formula:"(Ideal Cycle × Total Count) ÷ Run Time",desc:"Fraction of running time during which output matched theoretical maximum."},{letter:"Q",name:"Quality",formula:"Good Count ÷ Total Count",desc:"Fraction of produced output that met specification on first pass."}]},example:{title:"Rolling mill, 8-hour shift",inputs:[["Planned Production Time","480","min"],["Scheduled breaks","30","min"],["Unplanned stops","47","min"],["Total output","380","tonnes"],["Rejected output","8","tonnes"],["Ideal cycle time","1.0","min/t"]],calcs:[["A","(480 − 30 − 47) ÷ 450","89.6%"],["P","(1.0 × 380) ÷ 403","94.3%"],["Q","(380 − 8) ÷ 380","97.9%"]],result:{label:"OEE",formula:"0.896 × 0.943 × 0.979",value:"82.7%"}},benchmarks:[{tier:"World class",range:"≥ 90%",desc:"Theoretical ceiling for non-bottleneck assets in world-class operations."},{tier:"Strong",range:"80–89%",desc:"Mature operations with disciplined Lean and TPM practices."},{tier:"Industry average",range:"70–79%",desc:"Typical for well-run regional steel and process plants."},{tier:"Below average",range:"60–69%",desc:"Visible reliability or quality losses on multiple lines."},{tier:"Underperforming",range:"< 60%",desc:"Multiple compounding issues — reliability, supervision, or quality."}],notes:[{title:"Track the trend, not the single number",body:"A single shift's OEE is statistical noise. The value comes from tracking the same line, with the same definitions, week after week."},{title:"Define Planned Production Time once",body:"Whether scheduled maintenance counts inside Planned Production Time changes the figure significantly. ISI Steel's house convention is to exclude scheduled maintenance."},{title:"Always publish A, P, and Q alongside",body:"Two lines can both report 80% OEE and still need entirely different interventions. The headline number cannot tell you which lever to pull. The components can."},{title:"Do not compare across line types",body:"A galvanise line and a steel pipe line have fundamentally different cycle physics. Each line should be benchmarked against its own design capacity."}],takeaway:"OEE is most powerful as a diagnostic tool, not a scoreboard. Its real value is the conversation it forces — about which of the three components to act on next."},
{id:"cwc",chapter:3,section:"Galvanise Line",n:"01",type:"lag",name:"Coating Weight Conformance",acronym:"CWC",chapterArea:"Galvanise Processing Line",def:"The proportion of coil produced with zinc coating weight within specified tolerance, measured in g/m² per side. The most direct measure of galvanise process control and a key customer-facing quality attribute.",why:"Coating weight is the single most expensive consumable in galvanising — too heavy wastes zinc, too light fails specification. It is also the attribute most often tested by customers.",formula:{main:"CWC = In-Tolerance Length ÷ Total Coil Length × 100%",note:"Tolerance typically ±10% of nominal coating weight. Measured continuously by online thickness gauges."},example:{title:"Galvanise line, daily",inputs:[["Nominal coating","Z275 (275 g/m²)","—"],["Tolerance band","± 27.5","g/m²"],["Total coil length","12,400","m"],["In-tolerance length","12,036","m"],["Out-of-tolerance length","364","m"]],calcs:[["CWC","12,036 ÷ 12,400 × 100","97.1%"]],result:{label:"Conformance",formula:"% of length within tolerance",value:"97.1%"}},benchmarks:[{tier:"World class",range:"≥ 99%",desc:"Tight closed-loop coating control; minimal off-spec metres per coil."},{tier:"Strong",range:"97–99%",desc:"Mature line with effective real-time gauging."},{tier:"Industry average",range:"94–97%",desc:"Routine variation at coil ends and grade changes."},{tier:"Below average",range:"88–94%",desc:"Visible coating control issues; customer complaints likely."},{tier:"Underperforming",range:"< 88%",desc:"Line is consistently producing off-spec coating."}],notes:[{title:"Both directions are losses",body:"Heavy coating wastes zinc; light coating fails spec. Conformance bands must be tight on both sides."},{title:"Coil ends are the high-risk zone",body:"Most off-spec metres occur at coil head and tail during line speed transitions. Track conformance by coil position."},{title:"Pair with zinc consumption ratio",body:"Conformance can be high while zinc consumption is also high (running near top of tolerance). The two metrics together expose whether you are spending zinc to hit the spec."},{title:"Audit gauge calibration",body:"Online gauges drift; their calibration determines what 'in tolerance' actually means. Build calibration verification into daily startup."}],takeaway:"Coating weight is where galvanising profit is made or lost. Conformance is necessary; running tight against the bottom of the tolerance is what creates the margin."},
{id:"cpk",chapter:4,n:"05",type:"lag",name:"Process Capability Index",acronym:"Cpk",chapterArea:"Process Capability",def:"A statistical index measuring whether a process is capable of producing output within specification limits, accounting for both variation (spread) and centring relative to those limits.",why:"FPY tells you how much current output is in spec; Cpk tells you whether the process is capable of staying in spec going forward. A high FPY with low Cpk means today is fine but tomorrow is at risk.",formula:{main:"Cpk = min[ (USL − μ) ÷ 3σ , (μ − LSL) ÷ 3σ ]",note:"USL = Upper Spec Limit, LSL = Lower Spec Limit, μ = process mean, σ = standard deviation.",components:[{letter:"USL",name:"Upper Spec Limit",formula:"Customer-defined ceiling",desc:"The maximum acceptable value; above this is non-conforming."},{letter:"LSL",name:"Lower Spec Limit",formula:"Customer-defined floor",desc:"The minimum acceptable value; below this is non-conforming."},{letter:"σ",name:"Process Std Dev",formula:"Within-subgroup",desc:"Short-term variation, calculated within rational subgroups."}]},example:{title:"Galvanise coating thickness, Z275",inputs:[["Specification (USL / LSL)","302.5 / 247.5","g/m²"],["Process mean (μ)","278","g/m²"],["Process std dev (σ)","6.5","g/m²"]],calcs:[["Upper side","(302.5 − 278) ÷ (3 × 6.5)","1.26"],["Lower side","(278 − 247.5) ÷ (3 × 6.5)","1.56"],["Cpk","min(1.26, 1.56)","1.26"]],result:{label:"Cpk",formula:"Capable but off-centre",value:"1.26"}},benchmarks:[{tier:"World class",range:"≥ 2.00",desc:"Six Sigma capability; virtually no defects across long runs."},{tier:"Strong",range:"1.67–2.00",desc:"Highly capable; tight spread and well-centred process."},{tier:"Industry average",range:"1.33–1.67",desc:"Capable; standard target for most automotive customers."},{tier:"Below average",range:"1.00–1.33",desc:"Marginally capable; routine excursions expected."},{tier:"Underperforming",range:"< 1.00",desc:"Not capable; process spread exceeds specification window."}],notes:[{title:"Cpk vs. Cp tells you what's wrong",body:"Cp measures pure spread; Cpk also penalises off-centre. If Cp is high but Cpk is low, the process is tight but mis-targeted."},{title:"Sample size and timeframe matter",body:"Cpk from 30 measurements over a shift will look better than from 300 over a month. Document the sample basis explicitly."},{title:"Normality is an assumption",body:"Cpk math assumes the distribution is approximately normal. For skewed processes, use non-parametric capability indices."},{title:"Cpk is short-term capability",body:"Cpk uses within-subgroup σ. Pp/Ppk uses overall σ. When Ppk is below Cpk, the process drifts between subgroups."}],takeaway:"Cpk is the most powerful single number in quality engineering. It tells you not just whether output is in spec today, but whether the process has the stability to stay there."},
{id:"mtbf",chapter:5,n:"01",type:"lag",name:"Mean Time Between Failures",acronym:"MTBF",chapterArea:"Asset Reliability",def:"The average operating time between unplanned failures of a piece of equipment. The most direct measure of asset reliability, and a key driver of OEE Availability.",why:"Failures are expensive twice — they cost the immediate downtime, and they erode confidence in the asset. MTBF quantifies reliability and lets engineering investments be evaluated against a measurable baseline.",formula:{main:"MTBF = Total Operating Time ÷ Number of Failures",note:"Operating time = time the equipment was running (not calendar time). A 'failure' is any unplanned stop requiring corrective intervention."},example:{title:"Galvanise line, monthly",inputs:[["Total running hours","612","h"],["Number of unplanned failures","8","—"],["Total downtime (failures)","27","h"],["Average failure duration","3.4","h"]],calcs:[["MTBF","612 ÷ 8","76.5 h"]],result:{label:"MTBF",formula:"Avg time between failures",value:"76.5 h"}},benchmarks:[{tier:"World class",range:"≥ 250 h",desc:"Predictive maintenance; equipment runs for weeks between corrective events."},{tier:"Strong",range:"150–250 h",desc:"Mature reliability programme; routine PM compliance."},{tier:"Industry average",range:"75–150 h",desc:"Standard reactive-with-PM maintenance approach."},{tier:"Below average",range:"30–75 h",desc:"Frequent failures; reliability impacting OEE materially."},{tier:"Underperforming",range:"< 30 h",desc:"Equipment failing more than once per shift; firefighting culture."}],notes:[{title:"Define failure carefully",body:"If every minor stop counts, MTBF will be dominated by trivial events. Use a documented severity threshold."},{title:"Pair with MTTR",body:"MTBF tells you how often it breaks; MTTR tells you how long to recover. Both matter for Availability."},{title:"Track per failure mode",body:"Aggregate MTBF hides the dominant failure modes. Coding failures by component exposes the 1-2 modes responsible for 80% of events."},{title:"Operating time, not calendar time",body:"MTBF must be calculated on running hours. A line that runs one shift a day will look more reliable on calendar basis than running basis."}],takeaway:"MTBF is the foundational reliability metric. It links engineering's preventive work to operations' availability."}
];
